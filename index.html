<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="assets/css/main_page_style.css" />
        <title>PeakAtlas</title>
    </head>
    <body>
        <header>
            <nav>
                <button class="hamburger" id="hamburger">☰</button>
                <div class="logo-section">
                    <a href="#">
                        <img
                            src="assets/images/logos/mountain.png"
                            alt="logo"
                            class="logo"
                        />
                        <h1>PeakAtlas</h1>
                    </a>
                </div>
                <div class="link-section">
                    <a href="#">Home</a>
                    <a href="#">Explore</a>
                    <a href="#">Countries</a>
                    <a href="#">Mountains</a>
                    <a href="#">Gallery</a>
                    <a href="#">Articles</a>
                    <a href="#">About</a>
                </div>
                <form>
                    <input type="search" placeholder="Search" />
                    <button type="button" class="search-btn">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="32"
                            height="32"
                            viewBox="0 0 24 24"
                        >
                            <!-- Icon from Material Symbols by Google - https://github.com/google/material-design-icons/blob/master/LICENSE -->
                            <path
                                fill="#ffffff"
                                d="m19.6 21l-6.3-6.3q-.75.6-1.725.95T9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l6.3 6.3zM9.5 14q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14"
                            />
                        </svg>
                    </button>
                </form>
            </nav>
        </header>
        <main>
            <section class="video-intro">
                <video
                    src="assets/video/My Movie 1.mp4"
                    autoplay
                    loop
                    muted
                ></video>
                <div class="overlay"></div>
                <div class="content">
                    <p>
                        Discover The <br />World's Most <br />Majestic Mountains
                    </p>
                    <p>
                        Explore the highest and most beautiful mountains
                        <br />in every country
                    </p>
                    <div>
                        <button>Explore Mountain</button>
                        <button>View Article</button>
                    </div>
                </div>
            </section>
        </main>
        <footer></footer>
        <script src="assets/js/main.js"></script>
    </body>
</html>
